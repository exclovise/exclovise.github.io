<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exclovise Minecraft Server</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
  <script defer src="assets/leaves.js"></script>
</head>
<body>
  <header>
    <img src="assets/logo.png" alt="Exclovise Logo" class="logo">
    <h1>Exclovise SMP</h1>
    <button id="darkModeToggle">🌓</button>
  </header>

  <section class="status-card">
    <h2>Server Status</h2>
    <p id="server-status">Loading...</p>
    <p id="player-list"></p>
  </section>

  <section class="changelog">
    <h2>📜 Changelog</h2>
    <ul id="changelog-list"></ul>
  </section>

  <section class="socials">
    <h2>🌐 Connect</h2>
    <a href="https://discord.gg/nH365u2k" target="_blank">Join our Discord</a>
  </section>

  <footer>
    <p>&copy; 2025 Exclovise SMP</p>
  </footer>
</body>
</html>
